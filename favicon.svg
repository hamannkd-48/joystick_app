<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#2e2a23"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#7db891" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#7db891" stroke-width="2"/>
  <!-- Cross lines (N/S/E/W stubs) -->
  <line x1="16" y1="4"  x2="16" y2="7.5"  stroke="#7db891" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="24.5" x2="16" y2="28" stroke="#7db891" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="7.5"  y2="16" stroke="#7db891" stroke-width="2" stroke-linecap="round"/>
  <line x1="24.5" y1="16" x2="28" y2="16" stroke="#7db891" stroke-width="2" stroke-linecap="round"/>
</svg>
